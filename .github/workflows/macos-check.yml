name: macOS Script Validation
on: [push]

jobs:
  check-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get macOS UUID
        id: get_id
        run: |
          UUID=$(ioreg -d2 -c IOPlatformExpertDevice | awk -F\" '/IOPlatformUUID/{print $(NF-1)}')
          echo "MAC_ID=$UUID" >> $GITHUB_ENV
          echo "Found UUID: $UUID"

      - name: Run JS Logic Test
        run: node test-logic.js

      - name: Test Google Apps Script Connectivity
        run: |
          echo "Sending test request to Google Apps Script..."
          # שליחת בקשה ל-URL מהסקריפט שלך
          RESPONSE=$(curl -L -s -X POST -H "Content-Type: application/json" \
            -d '{"license_key":"TEST-KEY", "machine_id":"TEST-ID", "product_code":"IG-ID-01"}' \
            "https://script.google.com/macros/s/AKfycbxKoNsJd-IYlsRuQVclZ6RvXVhxe8zGnNUdmX7mPCZKJLWAC5nx8QjvhYe_gJhTTLjhQw/exec")
          
          echo "Full Server Response: $RESPONSE"
          
          if [[ $RESPONSE == *"success"* ]]; then
            echo "✅ Google Apps Script is online and responding with JSON!"
          elif [[ -z "$RESPONSE" ]]; then
            echo "❌ Error: No response from Google Apps Script. Check URL or Permissions."
            exit 1
          else
            echo "⚠️ Server responded, but not with a success message. Check your Apps Script code."
          fi
