name: macOS Logic Check
on: [push]

jobs:
  run-test:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get macOS UUID
        id: get_id
        run: |
          # שליפת ה-UUID של המק כפי שעשית בסקריפט
          UUID=$(ioreg -d2 -c IOPlatformExpertDevice | awk -F\" '/IOPlatformUUID/{print $(NF-1)}')
          echo "MAC_ID=$UUID" >> $GITHUB_ENV
          echo "Found UUID: $UUID"

      - name: Run Test Logic
        run: node test-logic.js
